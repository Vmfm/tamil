<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil VM FM - Live Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    /* Root Variables for easy theme management */
    :root {
        --bg-color: #05162e;
        --card-bg: rgba(255, 255, 255, 0.05);
        --text-color: #ffffff;
        --accent-color: #ffcc00;
        --fav-color: #ff6600;
    }

    .light-mode {
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
        --text-color: #1a1a1a;
    }

    /* Loader */
    #loader {
        position: fixed;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 20px;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    #content { 
        display: none; 
        width: 100%;
        max-width: 600px; /* Constrains width for a mobile-app feel */
    }

    /* Floating Header Buttons */
    .header-controls {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-bottom: 25px;
        position: sticky;
        top: 10px;
        z-index: 1000;
    }

    .btn {
        border: none;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: transform 0.2s;
    }

    .btn:active { transform: scale(0.95); }

    .fav-page-btn { background: var(--fav-color); color: white; }
    .toggle-btn { background: var(--accent-color); color: black; }

    /* Station Grid */
    .station-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .station {
        position: relative;
        background: var(--card-bg);
        border-radius: 15px;
        padding: 10px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .station:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .station img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 8px;
    }

    .favorite-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        cursor: pointer;
        font-size: 20px;
        background: rgba(0,0,0,0.6);
        width: 30px;
        height: 30px;
        line-height: 30px;
        border-radius: 50%;
        color: white;
    }

    .station-name {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
    }

    /* Footer */
    footer {
        margin-top: 40px;
        padding: 20px;
        text-align: center;
        font-size: 12px;
        opacity: 0.7;
        width: 100%;
    }
</style>
</head>
<body>

<div id="loader">
    <img src="https://vmfm.github.io/tamil/Images/loading3.gif" alt="Loading..." />
</div>

<div id="content">
    <div class="header-controls">
        <button class="btn fav-page-btn" onclick="window.location.href='go:fave'">⭐ Favorites</button>
        <button class="btn toggle-btn" onclick="toggleMode()">🌓 Theme</button>
    </div>

    <div class="station-grid">
        <div class="station">
            <a href="go:kaarai"><img src="https://vmfm.github.io/tamil/Images/airkaaraikalfm1.jpg"></a>
            <span class="favorite-btn" data-name="KARAIKAL FM" data-img="https://vmfm.github.io/tamil/Images/airkaaraikalfm1.jpg" data-link="go:kaarai">☆</span>
            <div class="station-name">KARAIKAL FM</div>
        </div>

        <div class="station">
            <a href="go:trichy"><img src="https://vmfm.github.io/tamil/Images/airtrichyfm.jpg"></a>
            <span class="favorite-btn" data-name="TRICHY FM" data-img="https://vmfm.github.io/tamil/Images/airtrichyfm.jpg" data-link="go:trichy">☆</span>
            <div class="station-name">TRICHY FM</div>
        </div>

        <div class="station">
            <a href="go:dharm"><img src="https://vmfm.github.io/tamil/Images/airdharmaburifm.jpg"></a>
            <span class="favorite-btn" data-name="DHARMA FM" data-img="https://vmfm.github.io/tamil/Images/airdharmaburifm.jpg" data-link="go:dharm">☆</span>
            <div class="station-name">DHARMA FM</div>
        </div>

        <div class="station">
            <a href="go:nagerfm"><img src="https://vmfm.github.io/tamil/Images/airnagercovilfm.jpg"></a>
            <span class="favorite-btn" data-name="KUMARI FM" data-img="https://vmfm.github.io/tamil/Images/airnagercovilfm.jpg" data-link="go:nagerfm">☆</span>
            <div class="station-name">KUMARI FM</div>
        </div>

        <div class="station">
            <a href="go:chennaifm"><img src="https://vmfm.github.io/tamil/Images/airchennaifm.jpg"></a>
            <span class="favorite-btn" data-name="CHENNAI FM" data-img="https://vmfm.github.io/tamil/Images/airchennaifm.jpg" data-link="go:chennaifm">☆</span>
            <div class="station-name">CHENNAI FM</div>
        </div>

        <div class="station">
            <a href="go:nellaifm"><img src="https://vmfm.github.io/tamil/Images/airtrinelvelyfm.jpg"></a>
            <span class="favorite-btn" data-name="NELLAI FM" data-img="https://vmfm.github.io/tamil/Images/airtrinelvelyfm.jpg" data-link="go:nellaifm">☆</span>
            <div class="station-name">NELLAI FM</div>
        </div>

        <div class="station">
            <a href="go:covaifm"><img src="https://vmfm.github.io/tamil/Images/aircoimbaturefm.jpg"></a>
            <span class="favorite-btn" data-name="COVAI FM" data-img="https://vmfm.github.io/tamil/Images/aircoimbaturefm.jpg" data-link="go:covaifm">☆</span>
            <div class="station-name">COVAI FM</div>
        </div>

        <div class="station">
            <a href="go:ootyfm"><img src="https://vmfm.github.io/tamil/Images/airootyfm.jpg"></a>
            <span class="favorite-btn" data-name="OOTY FM" data-img="https://vmfm.github.io/tamil/Images/airootyfm.jpg" data-link="go:ootyfm">☆</span>
            <div class="station-name">OOTY FM</div>
        </div>

        <div class="station">
            <a href="go:Fmmadu"><img src="https://vmfm.github.io/tamil/Images/airmaduraifm.jpg"></a>
            <span class="favorite-btn" data-name="MADURAI FM" data-img="https://vmfm.github.io/tamil/Images/airmaduraifm.jpg" data-link="go:Fmmadu">☆</span>
            <div class="station-name">MADURAI FM</div>
        </div>
        
        </div>

    <footer>
        Designed by <strong>TAMILVM</strong>
    </footer>
</div>

<script>
window.onload = function () {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("content").style.display = "block";
        loadFavorites();
    }, 1500);
};

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

document.addEventListener("click", function(e) {
    if (e.target.classList.contains("favorite-btn")) {
        let btn = e.target;
        let stationName = btn.dataset.name;
        let stationImg = btn.dataset.img;
        let stationLink = btn.dataset.link;

        let exists = favorites.find(fav => fav.name === stationName);

        if (exists) {
            favorites = favorites.filter(fav => fav.name !== stationName);
            btn.textContent = "☆";
        } else {
            favorites.push({ name: stationName, img: stationImg, link: stationLink });
            btn.textContent = "⭐";
        }
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }
});

function loadFavorites() {
    document.querySelectorAll(".favorite-btn").forEach(btn => {
        let stationName = btn.dataset.name;
        if (favorites.find(fav => fav.name === stationName)) {
            btn.textContent = "⭐";
        } else {
            btn.textContent = "☆";
        }
    });
}

function toggleMode() {
    document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
